name: build-and-deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Backend
        run: |
          cd backend
          npm install
          npm run build || true
          cd ..

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: tshewang7
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: tshewang7/dso101-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: tshewang7/dso101-frontend:latest

      - name: Trigger Render Backend Deployment
        run: |
          curl -X POST ${{ secrets.RENDER_BACKEND_WEBHOOK }}

      - name: Trigger Render Frontend Deployment
        run: |
          curl -X POST ${{ secrets.RENDER_FRONTEND_WEBHOOK }}

      - name: Deployment Success
        run: echo "✅ Deployment completed successfully"
