name: DSO101 - Build & Deploy to Docker Hub & Render

on:
  push:
    branches: ["main"]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build and Push Backend Image
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dso101-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dso101-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Build and Push Frontend Image
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dso101-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dso101-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://todo-backend-test-0srz.onrender.com
            REACT_APP_API_URL=https://todo-backend-test-0srz.onrender.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Trigger Render Backend Deployment
      - name: Trigger Render Backend Deployment
        if: success()
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ]; then
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }} \
              -H "Content-Type: application/json"
            echo "✅ Render backend deployment triggered"
          fi

      # 7. Trigger Render Frontend Deployment
      - name: Trigger Render Frontend Deployment
        if: success()
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ]; then
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }} \
              -H "Content-Type: application/json"
            echo "✅ Render frontend deployment triggered"
          fi

      # 8. Success Notification
      - name: Deployment Success
        if: success()
        run: echo "✅ Build, push to Docker Hub, and Render deployment triggered successfully!"

      # 9. Failure Notification
      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."
