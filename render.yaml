services:
  - type: web
    name: dso101-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 5000
      - key: DB_PATH
        value: /app/data/todos.db
      - key: NODE_ENV
        value: production

  - type: web
    name: dso101-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3000
      - key: VITE_API_URL
        value: https://dso101-backend.onrender.com
      - key: REACT_APP_API_URL
        value: https://dso101-backend.onrender.com
