services:
  - type: web
    name: dsoa3-backend-latest
    env: docker
    plan: free
    image:
      url: docker.io/tshewang7/dso101-backend:latest
    autoDeploy: true
    envVars:
      - key: PORT
        value: 5000
      - key: DB_PATH
        value: /tmp/todos.json

  - type: web
    name: dsoa3-frontend-latest
    env: docker
    plan: free
    image:
      url: docker.io/tshewang7/dso101-frontend:latest
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3000
      - key: VITE_API_URL
        value: https://dsoa3-backend-latest.onrender.com
      - key: REACT_APP_API_URL
        value: https://dsoa3-backend-latest.onrender.com
